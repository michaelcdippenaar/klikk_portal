<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 20" width="164" height="20" fill="none" aria-label="Klikk Financials">
  <!--
    Horizontal lockup — dark theme.
    Identical geometry to lockup-light.svg.
    On dark surface set CSS: color: var(--klikk-ink) → resolves to #E8E3DC.
    No geometry or opacity changes needed — inversion is a CSS concern only.
  -->

  <!-- The Tally Mark -->
  <rect x="0" y="4"   width="12" height="3" rx="1" fill="currentColor"/>
  <rect x="0" y="8.5" width="8"  height="3" rx="1" fill="currentColor"/>
  <rect x="0" y="13"  width="4"  height="3" rx="1" fill="currentColor"/>

  <!-- Wordmark: "klikk" -->
  <text
    x="20"
    y="14"
    font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="-0.325"
    fill="currentColor"
  >klikk</text>

  <!-- Wordmark: "financials" — demoted label -->
  <text
    x="62"
    y="14"
    font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="0.7"
    fill="currentColor"
    opacity="0.4"
  >financials</text>
</svg>
