<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none" aria-label="Klikk Financials mark">
  <!--
    The Tally Mark — dark theme.
    Identical geometry to mark-light.svg. Color is set via CSS:
      color: var(--klikk-ink)   (resolves to #E8E3DC on dark surface)
    No geometry change needed — inversion is entirely a CSS concern.
  -->
  <rect x="4" y="4" width="12" height="3" rx="1" fill="currentColor"/>
  <rect x="4" y="8.5" width="8" height="3" rx="1" fill="currentColor"/>
  <rect x="4" y="13" width="4" height="3" rx="1" fill="currentColor"/>
</svg>
