  <g transform="translate(2, 2)">
    <rect x="1" y="1" width="18" height="18" rx="4" fill="#E8E3DC"/>
    <line x1="6.5" y1="5.5" x2="6.5" y2="14.5" stroke="#141210" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6.5" y1="10" x2="13" y2="5.5" stroke="#141210" stroke-width="1.6" stroke-linecap="round"/>
