<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none">
  <!-- Direction 1: Sigma-K — two horizontal rails connected by a diagonal stem -->
  <!-- Light surface version: ink on warm-stone -->
  <title>Klikk Financials Console — Sigma-K mark</title>

  <!-- Top rail -->
  <line x1="4" y1="4.5" x2="16" y2="4.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom rail -->
  <line x1="4" y1="15.5" x2="16" y2="15.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal stem top-right to bottom-left (the K diagonal, reread as a ledger strike) -->
  <line x1="15" y1="5.5" x2="5" y2="14.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Short upper leg from mid-stem upward right -->
  <line x1="10" y1="10" x2="15" y2="5.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Short lower leg from mid-stem downward right -->
  <line x1="10" y1="10" x2="15" y2="14.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
</svg>
