<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 24" width="180" height="24" fill="none">
  <!--
    Direction 3: The Ledger Block — horizontal lockup, light surface
    Mark sits at 20x20, vertically centred in 24px header row.
    Wordmark: "klikk" medium, then a mid-dot separator, then "financials" in
    small-caps-style tracking at low opacity — hierarchy without clutter.
  -->
  <g transform="translate(2, 2)">
    <rect x="1" y="1" width="18" height="18" rx="4" fill="#1A1917"/>
    <line x1="6.5" y1="5.5" x2="6.5" y2="14.5" stroke="#F5F1EB" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6.5" y1="10" x2="13" y2="5.5" stroke="#F5F1EB" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6.5" y1="10" x2="13" y2="14.5" stroke="#F5F1EB" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- "klikk" wordmark -->
  <text x="30" y="16"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="500" letter-spacing="-0.025em"
        fill="#1A1917">klikk</text>
  <!-- mid-dot separator -->
  <text x="70" y="15.5"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="300"
        fill="#1A1917" fill-opacity="0.3">·</text>
  <!-- "financials" demoted -->
  <text x="79" y="16"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="9.5" font-weight="400" letter-spacing="0.07em"
        fill="#1A1917" fill-opacity="0.4">financials</text>
</svg>
