<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none">
  <!-- Direction 2: The Bracket — a code-bracket form with K negative space -->
  <!-- Outer bracket shape: square with left-side notch suggesting [ -->
  <!-- Left bracket arm -->
  <path d="M7 3 L5 3 L5 17 L7 17" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right bracket arm -->
  <path d="M13 3 L15 3 L15 17 L13 17" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- K inside: vertical stem -->
  <line x1="8.5" y1="6" x2="8.5" y2="14" stroke="#1A1917" stroke-width="1.25" stroke-linecap="round"/>
  <!-- K upper diagonal -->
  <line x1="8.5" y1="10" x2="12" y2="6" stroke="#1A1917" stroke-width="1.25" stroke-linecap="round"/>
  <!-- K lower diagonal -->
  <line x1="8.5" y1="10" x2="12" y2="14" stroke="#1A1917" stroke-width="1.25" stroke-linecap="round"/>
</svg>
