<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 24" width="200" height="24" fill="none">
  <!--
    Direction 4: The Cursor K — horizontal lockup, light surface
    Mark occupies ~20x20 at left. Wordmark: "klikk" in medium weight
    then "financials console" in two tiers of opacity — "financials"
    at low opacity, "console" slightly higher to reinforce the tool identity.
    The amber cursor in the mark carries the accent; no amber in the text.
  -->
  <g transform="translate(0, 2)">
    <line x1="5.5" y1="3.5" x2="5.5" y2="14.5" stroke="#1A1917" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="9" x2="13.5" y2="3.5" stroke="#1A1917" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="9" x2="13.5" y2="14.5" stroke="#1A1917" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="17" x2="10" y2="17" stroke="#C8922A" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- "klikk" -->
  <text x="26" y="16"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="500" letter-spacing="-0.025em"
        fill="#1A1917">klikk</text>
  <!-- "financials" very light -->
  <text x="67" y="13"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="8" font-weight="400" letter-spacing="0.08em"
        fill="#1A1917" fill-opacity="0.35">financials</text>
  <!-- "console" slightly more present -->
  <text x="67" y="21"
        font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="8" font-weight="500" letter-spacing="0.08em"
        fill="#1A1917" fill-opacity="0.55">console</text>
</svg>
