<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 24" width="160" height="24" fill="none">
  <!-- Direction 1: Sigma-K — horizontal lockup, light surface -->
  <!-- Mark at 20x20, centred vertically in 24px row -->
  <g transform="translate(2, 2)">
    <line x1="4" y1="4.5" x2="16" y2="4.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="15.5" x2="16" y2="15.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="5.5" x2="5" y2="14.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="15" y2="5.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="15" y2="14.5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Divider -->
  <line x1="28" y1="5" x2="28" y2="19" stroke="#1A1917" stroke-width="0.75" stroke-opacity="0.2"/>
  <!-- Wordmark: "klikk" in medium weight, "financials" demoted -->
  <text x="36" y="16" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="500" letter-spacing="-0.02em" fill="#1A1917">klikk</text>
  <text x="90" y="16" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="10" font-weight="400" letter-spacing="0.04em" fill="#1A1917" fill-opacity="0.45">financials</text>
</svg>
