<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none">
  <!--
    Direction 3: The Ledger Block — dark surface
    On dark: the container becomes warm-stone (#E8E3DC) so it glows
    against the dark background. K is cut in dark ink.
    This inverts naturally and stays brand-coherent.
  -->
  <rect width="20" height="20" fill="#141210"/>
  <!-- Container: warm-stone block -->
  <rect x="1" y="1" width="18" height="18" rx="4" fill="#E8E3DC"/>
  <!-- K cutout in dark ink -->
  <line x1="6.5" y1="5.5" x2="6.5" y2="14.5" stroke="#141210" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="6.5" y1="10" x2="13" y2="5.5" stroke="#141210" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="6.5" y1="10" x2="13" y2="14.5" stroke="#141210" stroke-width="1.6" stroke-linecap="round"/>
</svg>
