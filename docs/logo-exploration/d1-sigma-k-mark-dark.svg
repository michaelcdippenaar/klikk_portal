<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none">
  <!-- Direction 1: Sigma-K — dark surface version -->
  <rect width="20" height="20" fill="#141210"/>
  <!-- Top rail -->
  <line x1="4" y1="4.5" x2="16" y2="4.5" stroke="#E8E3DC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom rail -->
  <line x1="4" y1="15.5" x2="16" y2="15.5" stroke="#E8E3DC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal stem -->
  <line x1="15" y1="5.5" x2="5" y2="14.5" stroke="#E8E3DC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Upper leg -->
  <line x1="10" y1="10" x2="15" y2="5.5" stroke="#E8E3DC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower leg -->
  <line x1="10" y1="10" x2="15" y2="14.5" stroke="#E8E3DC" stroke-width="1.5" stroke-linecap="round"/>
</svg>
